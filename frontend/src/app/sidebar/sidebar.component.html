<aside class="sidebar">
  <div class="sidebar__brand">
    <a class="sidebar__logo" routerLink="/shopping-list" aria-label="bazkit Startseite">
      <span class="sidebar__logo-dark">baz</span><span class="sidebar__logo-accent">kit</span>
    </a>
  </div>

  <nav class="sidebar__nav" aria-label="Hauptnavigation">
    <a
      class="sidebar__nav-item"
      routerLink="/shopping-list"
      routerLinkActive="sidebar__nav-item--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="3.5" y="3.5" width="17" height="17" rx="3.5"></rect>
          <path d="M8 8H16"></path>
          <path d="M8 12H16"></path>
          <path d="M8 16H16"></path>
        </svg>
      </span>
      <span class="sidebar__label">Einkaufsliste</span>
    </a>

    <a
      class="sidebar__nav-item"
      routerLink="/saved-lists"
      routerLinkActive="sidebar__nav-item--active"
    >
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M7 4.5H17C17.55 4.5 18 4.95 18 5.5V19.5L12 15.8L6 19.5V5.5C6 4.95 6.45 4.5 7 4.5Z"></path>
        </svg>
      </span>
      <span class="sidebar__label">Gespeicherte Listen</span>
    </a>

    <a
      class="sidebar__nav-item"
      routerLink="/recipes"
      routerLinkActive="sidebar__nav-item--active"
    >
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3.5 8.5H9.2L11.1 6.5H20.5V17.5C20.5 18.05 20.05 18.5 19.5 18.5H4.5C3.95 18.5 3.5 18.05 3.5 17.5V8.5Z"></path>
          <path d="M3.5 8.5V7.5C3.5 6.95 3.95 6.5 4.5 6.5H8.2"></path>
        </svg>
      </span>
      <span class="sidebar__label">Rezepte</span>
    </a>

    <a
      class="sidebar__nav-item"
      routerLink="/settings"
      routerLinkActive="sidebar__nav-item--active"
    >
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 8.9C10.29 8.9 8.9 10.29 8.9 12C8.9 13.71 10.29 15.1 12 15.1C13.71 15.1 15.1 13.71 15.1 12C15.1 10.29 13.71 8.9 12 8.9Z"

          ></path>
        </svg>
      </span>
      <span class="sidebar__label">Einstellungen</span>
    </a>
  </nav>
</aside>
