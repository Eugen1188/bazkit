services:
  db:
    image: postgres:16-alpine
    container_name: bazkit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: bazkit-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: bazkit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:4200"
    command: python manage.py runserver 0.0.0.0:8000
    
volumes:
  postgres_data: